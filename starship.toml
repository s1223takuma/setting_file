"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
palette = "nightfox"

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$python\
$nodejs\
$rust\
$swift\
$java\
$dart\
$all\
$cmd_duration\
$line_break\
$time\
$status\
$jobs\
$character"""

[palettes.nightfox]
foreground = "#cdcecf"
muted = "#738091"
blue = "#719cd6"
cyan = "#63cdcf"
green = "#81b29a"
orange = "#f4a261"
pink = "#d67ad2"
purple = "#9d79d6"
red = "#c94f6d"
yellow = "#dbc074"

[directory]
format = "[$read_only]($read_only_style)[$path]($style) "
style = "bold blue"
read_only = "¾░î¥ "
read_only_style = "bold red"
truncation_length = 4
truncate_to_repo = false
truncation_symbol = "ÔÇª/"
home_symbol = "~"

[directory.substitutions]
"Desktop" = "¾░çä Desktop"
"Documents" = "¾░êÖ Documents"
"Downloads" = "´ÇÖ Downloads"

[git_branch]
symbol = "´Éÿ "
format = "[$symbol$branch]($style) "
style = "bold purple"
truncation_length = 32

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold yellow"
conflicted = "=${count}"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = '\$${count}'
modified = "!${count}"
staged = "+${count}"
renamed = "┬╗${count}"
deleted = "Ô£ÿ${count}"

[git_state]
format = "[\\($state( $progress_current/$progress_total)\\)]($style) "
style = "bold orange"

[fill]
symbol = " "

[python]
symbol = "¯êÁ "
format = "[$symbol$version( $virtualenv)]($style) "
style = "bold green"

[nodejs]
symbol = "¯£ÿ "
format = "[$symbol$version]($style) "
style = "bold green"

[rust]
symbol = "¯×¿ "
format = "[$symbol$version]($style) "
style = "bold orange"

[swift]
symbol = "¯Øò "
format = "[$symbol$version]($style) "
style = "bold orange"

[java]
symbol = "¯ëû "
format = "[$symbol$version]($style) "
style = "bold red"

[dart]
symbol = "¯×ÿ "
format = "[$symbol$version]($style) "
style = "bold cyan"

[cmd_duration]
min_time = 2000
format = "[¾▒ªƒ $duration]($style) "
style = "bold yellow"
show_notifications = false

[time]
disabled = false
format = "[$time]($style) "
time_format = "%m/%d %H:%M"
style = "bold yellow"

[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = "Ô£ÿ "
success_symbol = ""
style = "bold red"

[jobs]
symbol = "¾░£Ä "
format = "[$symbol$number]($style) "
style = "bold cyan"
number_threshold = 1

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[ÔØ«](bold yellow)"
